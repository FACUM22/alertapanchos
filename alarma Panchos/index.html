<!DOCTYPE html>

<title>Sistema Centenario</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

        <button onclick="mostrarB()">📥 Sector B</button>
    </div>

        <h2>Sector A</h2>
        <button onclick="enviarAlerta()">🚨 Enviar alerta</button>
        <p id="estado"></p>
        <button onclick="volver()">⬅ Volver</button>
    </div>

    <div id="sectorB" class="panel" style="display:none;">
        <h2>Sector B</h2>
        <p id="mensaje">Esperando aviso...</p>
        <button onclick="recibir()">✔️ Recibido</button>
        <button onclick="volver()">⬅ Volver</button>
    </div>

</div>

<script src="recibir.js"></script>
</body>
</html>
